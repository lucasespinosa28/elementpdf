<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 320px;
            max-height: 500px;
            padding: 15px;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        
        .header {
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        
        .header h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
        
        .button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        #startSelection {
            background-color: #4CAF50;
            color: white;
        }
        
        #startSelection:hover {
            background-color: #45a049;
        }
        
        #startSelection:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        .status {
            text-align: center;
            margin: 10px 0;
            font-size: 12px;
            color: #666;
        }
        
        .pdf-list {
            margin-top: 15px;
            border-top: 1px solid #e0e0e0;
            padding-top: 15px;
        }
        
        .pdf-list h4 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .clear-btn {
            background: none;
            border: none;
            color: #f44336;
            font-size: 12px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 3px;
        }
        
        .clear-btn:hover {
            background-color: #ffebee;
        }
        
        .pdf-item {
            display: flex;
            align-items: center;
            padding: 8px;
            margin: 5px 0;
            background-color: #f8f9fa;
            border-radius: 5px;
            border: 1px solid #e9ecef;
        }
        
        .pdf-icon {
            width: 20px;
            height: 20px;
            background-color: #d32f2f;
            color: white;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: bold;
            margin-right: 10px;
            flex-shrink: 0;
        }
        
        .pdf-info {
            flex-grow: 1;
            min-width: 0;
        }
        
        .pdf-name {
            font-size: 12px;
            font-weight: 500;
            color: #333;
            margin-bottom: 2px;
            word-break: break-word;
        }
        
        .pdf-details {
            font-size: 10px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }
        
        .pdf-date {
            flex-shrink: 0;
        }
        
        .pdf-url {
            flex-grow: 1;
            margin-right: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            font-size: 12px;
            padding: 20px;
            font-style: italic;
        }
        
        .stats {
            font-size: 11px;
            color: #888;
            text-align: center;
            margin-top: 10px;
        }
        
        .scroll-container {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .scroll-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .scroll-container::-webkit-scrollbar-thumb {
            background-color: #ccc;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h3>Element to PDF</h3>
        <div class="status" id="status">Click to start selecting elements</div>
        <button class="button" id="startSelection">Start Selection Mode</button>
    </div>
    
    <div class="pdf-list">
        <h4>
            Saved PDFs (<span id="pdfCount">0</span>)
            <button class="clear-btn" id="clearAll" title="Clear all saved PDFs">Clear All</button>
        </h4>
        
        <div class="scroll-container">
            <div id="pdfListContainer">
                <div class="empty-state" id="emptyState">
                    No PDFs saved yet.<br>
                    Select elements to start building your collection!
                </div>
            </div>
        </div>
        
        <div class="stats" id="stats"></div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>

<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
  
  <!-- HTML Element representation (dashed selection box) -->
  <rect x="20" y="25" width="50" height="35" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-dasharray="4,3" rx="3"/>
  
  <!-- Nested elements inside -->
  <rect x="25" y="30" width="40" height="6" fill="#E8F5E8" rx="2"/>
  <rect x="25" y="40" width="30" height="4" fill="#E8F5E8" rx="1"/>
  <rect x="25" y="47" width="35" height="8" fill="#E8F5E8" rx="2"/>
  
  <!-- Selection cursor/crosshair -->
  <g transform="translate(75, 45)">
    <circle cx="0" cy="0" r="3" fill="#FFFFFF"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#FFFFFF" stroke-width="2"/>
  </g>
  
  <!-- Arrow indicating conversion -->
  <path d="M 45 70 L 55 75 L 45 80 Z" fill="#FFFFFF"/>
  <line x1="30" y1="75" x2="45" y2="75" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- PDF document -->
  <g transform="translate(65, 70)">
    <!-- PDF page -->
    <rect x="0" y="0" width="35" height="45" fill="#FFFFFF" stroke="#2E7D32" stroke-width="2" rx="2"/>
    
    <!-- PDF text "PDF" -->
    <text x="17.5" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#D32F2F">PDF</text>
    
    <!-- PDF content lines -->
    <rect x="5" y="20" width="25" height="2" fill="#E0E0E0" rx="1"/>
    <rect x="5" y="25" width="20" height="2" fill="#E0E0E0" rx="1"/>
    <rect x="5" y="30" width="22" height="2" fill="#E0E0E0" rx="1"/>
    <rect x="5" y="35" width="18" height="2" fill="#E0E0E0" rx="1"/>
    
    <!-- Page fold corner -->
    <path d="M 30 0 L 35 0 L 35 5 Z" fill="#F5F5F5" stroke="#2E7D32" stroke-width="1"/>
    <path d="M 30 0 L 35 5 L 30 5 Z" fill="#E0E0E0"/>
  </g>
  
  <!-- Highlight glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Selection highlight effect on the HTML element -->
  <rect x="20" y="25" width="50" height="35" fill="none" stroke="#FFD54F" stroke-width="1.5" stroke-dasharray="2,2" rx="3" opacity="0.8" filter="url(#glow)"/>
</svg>